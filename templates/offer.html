

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Offer</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f9;
            margin: 0;
            padding: 0;
        }

        .offer-section {
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            color: white;
            text-align: center;
            padding: 50px 20px;
        }

        .offer-section h1 {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .offer-section p {
            font-size: 18px;
            margin-bottom: 20px;
        }

        .price {
            font-size: 28px;
            margin: 15px 0;
        }

        .old-price {
            text-decoration: line-through;
            color: #ddd;
            margin-right: 10px;
        }

        .new-price {
            color: #ffeb3b;
            font-weight: bold;
        }

        .btn {
            background-color: #ffeb3b;
            color: #000;
            padding: 12px 25px;
            text-decoration-style: none;
            font-size: 18px;
            border-radius: 5px;
            transition: 0.3s;
        }

        .btn:hover {
            background-color: #ffd600;
        }
    </style>
</head>

<body>

    <section class="offer-section">
        <h1>🔥 Special Fitness Offer</h1>
        <p>Boost your health with our Premium Protein & Fitness Kit</p>

        <div class="price">
            <span class="old-price">₹1999</span>
            <span class="new-price">₹999</span>
        </div>
<div class="timer-box">
    <h2>🔥 Offer Ends In:</h2>
    <p id="timer"></p>
</div>

<script>
// Set date (YYYY, MM-1, DD, HH, MM, SS)
let countDownDate = new Date("April 12, 2026 23:59:59").getTime();

let x = setInterval(function() {

    let now = new Date().getTime();
    let distance = countDownDate - now;

    let days = Math.floor(distance / (1000 * 60 * 60 * 24));
    let hours = Math.floor((distance / (1000 * 60 * 60)) % 24);
    let minutes = Math.floor((distance / 1000 / 60) % 60);
    let seconds = Math.floor((distance / 1000) % 60);

    document.getElementById("timer").innerHTML =
        days + "d " + hours + "h " + minutes + "m " + seconds + "s ";

    if (distance < 0) {
        clearInterval(x);
        document.getElementById("timer").innerHTML = "Offer Expired ❌";
    }

}, 1000);
</script>

<style>
.timer-box {
    text-align: center;
    background: waterblue ;
    color: #fff;
    padding: 20px;
    margin: 20px;
    border-radius: 10px;
}

#timer {
    font-size: 24px;
    font-weight: bold;
    color: #ffeb3b;
}
</style>
        <p>⏳ Limited Time Offer — Hurry Up!</p>

        <a href="#" class="btn">Buy Now</a>
    </section>

</body>
</html>
